services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: llm-postgres
    environment:
      POSTGRES_DB: spring_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d spring_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:latest
    container_name: llm-mcp-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  mcp-inspector:
    image: node:22-alpine
    container_name: mcp-inspector
    command: npx -y @modelcontextprotocol/inspector
    environment:
      HOST: 0.0.0.0
      CLIENT_PORT: "6274"
      SERVER_PORT: "6277"
      MCP_AUTO_OPEN_ENABLED: "false"
      DANGEROUSLY_OMIT_AUTH: "true"
    ports:
      - "6274:6274"   # Inspector web UI  -> http://localhost:6274
      - "6277:6277"   # MCP proxy server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
