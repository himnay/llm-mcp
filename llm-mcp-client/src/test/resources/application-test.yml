spring:
  config:
    activate:
      on-profile: test

  ai:
    # Tests stay on the OpenAI beans (fake key, no real calls) — no Ollama needed on CI
    model:
      chat: openai
      embedding: openai
    openai:
      api-key: test-key
      chat:
        options:
          model: gpt-4o-mini

logging:
  level:
    root: WARN
    com.org: DEBUG

management:
  tracing:
    enabled: false

app:
  security:
    injection-guard:
      enabled: true
