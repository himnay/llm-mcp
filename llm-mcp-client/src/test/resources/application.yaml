# Testcontainers provides a real PostgreSQL; @ServiceConnection wires datasource automatically.
# Flyway is disabled here (DDL via JPA ddl-auto) to keep tests fast and schema-portable.
spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  ai:
    openai:
      api-key: test-key
    mcp:
      client:
        enabled: false

management:
  tracing:
    sampling:
      probability: 0.0
