spring:
  application:
    name: ai-mcp-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_ai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_chat
    baseline-on-migrate: true
    baseline-version: 0
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      redis:
        initialize-schema: true
        index-name: tool_embeddings
        prefix: "tool_embeddings:"
    mcp:
      client:
        enabled: true
        initialized: false
        toolcallback:
          enabled: false
        streamable-http:
          connections:
            #            ticket:
            #              url: http://localhost:8081
            #            deployment:
            #              url: http://localhost:8082
            #            notification:
            #              url: http://localhost:8083
            #            hr:
            #              url: http://localhost:8084
            github:
              url: http://localhost:8085
#            gmail:
#              url: http://localhost:8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: ACTUATOR
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

info:
  app:
    name: ${spring.application.name}
    description: Org AI assistant — MCP client over HR / ticket / deployment / notification servers

assistant:
  security:
    enabled: ${API_AUTH_ENABLED:true}
    api-key: ${API_KEY:}
  name: Enterprise AI Assistant
  default-user: ${DEFAULT_USER:anonymous}
  mcp-auth-token: ${MCP_AUTH_TOKEN:}
  memory-window: 20
  max-tool-iterations: 5
  max-tool-result-chars: 8000
  rate-limit-per-minute: 30
  tool:
    timeout-seconds: 30
  sensitive-words:
    - "ignore previous instructions"
    - "ignore all previous"
    - "jailbreak"
    - "prompt injection"
    - "disregard your instructions"
    - "forget your instructions"
    - "you are now"
    - "act as if"
    - "pretend you are"
    - "DAN"
  write-tool-keywords:
    - apply
    - create
    - update
    - delete
    - send
    - deploy
    - trigger
    - rollback
    - cancel
    - remove
    - approve
    - assign
    - reschedule
  tool-selector:
    top-k: 10

logging:
  level:
    io:
      modelcontextprotocol: DEBUG
