spring:
  application:
    name: ai-mcp-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_ai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_chat
    baseline-on-migrate: true
    baseline-version: 0
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      redis:
        initialize-schema: true
        index-name: tool_embeddings
        prefix: "tool_embeddings:"
    mcp:
      client:
        enabled: true
        initialized: false
        toolcallback:
          enabled: false
        streamable-http:
          connections:
            #            ticket:
            #              url: http://localhost:8081
            deployment:
              url: http://localhost:8082
            #            notification:
            #              url: http://localhost:8083
            #            hr:
            #              url: http://localhost:8084
            github:
              url: http://localhost:8085
#            gmail:
#              url: http://localhost:8086

mcp:
  oauth2:
    token-uri: ${MCP_OAUTH2_TOKEN_URI:http://localhost:8180/realms/org-mcp/protocol/openid-connect/token}
    client-id: ${MCP_OAUTH2_CLIENT_ID:llm-mcp-client}
    client-secret: ${MCP_OAUTH2_CLIENT_SECRET:llm-mcp-client-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: ACTUATOR
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

info:
  app:
    name: ${spring.application.name}
    description: Org AI assistant — MCP client over HR / ticket / deployment / notification servers

assistant:
  security:
    enabled: ${API_AUTH_ENABLED:true}
    api-key: ${API_KEY:}
  name: Enterprise AI Assistant
  default-user: ${DEFAULT_USER:anonymous}
  mcp-auth-token: ${MCP_AUTH_TOKEN:}
  memory-window: 20
  max-tool-iterations: 5
  max-tool-result-chars: 8000
  rate-limit-per-minute: 30
  tool:
    timeout-seconds: 30
  sensitive-words:
    - "ignore previous instructions"
    - "ignore all previous"
    - "jailbreak"
    - "prompt injection"
    - "disregard your instructions"
    - "forget your instructions"
    - "you are now"
    - "act as if"
    - "pretend you are"
    - "DAN"
  write-tool-keywords:
    - apply
    - create
    - update
    - delete
    - send
    - deploy
    - trigger
    - rollback
    - cancel
    - remove
    - approve
    - assign
    - reschedule
  tool-selector:
    top-k: 10

# ── Prompt injection guard ────────────────────────────────────────────────────
# Regex patterns compiled at startup — add new signatures here without code changes.
app:
  security:
    injection-guard:
      enabled: ${INJECTION_GUARD_ENABLED:true}
      block-message: "Your request contains disallowed instructions and cannot be processed."
      patterns:
        # Instruction override attacks
        - "(?i)ignore\\s+(?:all\\s+)?(?:previous|prior|above|all)\\s+instructions?"
        - "(?i)ignore\\s+your\\s+(system\\s+)?prompt"
        - "(?i)forget\\s+(your|all|previous)\\s+(instructions?|context|training)"
        - "(?i)disregard\\s+(all|previous|your)\\s+instructions?"
        - "(?i)override\\s+(the\\s+)?(system|previous|all)\\s+(prompt|instructions?)"
        # Roleplay / persona hijack
        - "(?i)you\\s+are\\s+now\\s+(?:DAN|an?\\s+AI\\s+without)"
        - "(?i)act\\s+as\\s+if\\s+you\\s+(have\\s+no|are\\s+without)\\s+(restrictions?|rules?)"
        - "(?i)pretend\\s+(you\\s+are|to\\s+be)\\s+"
        - "(?i)roleplay\\s+as\\s+"
        - "(?i)simulate\\s+(a|an|the)\\s+.{0,30}(AI|model|assistant|bot)"
        # System prompt exfiltration
        - "(?i)(print|reveal|show|output|repeat|display)\\s+(your\\s+)?(system\\s+)?prompt"
        - "(?i)(print|repeat|show)\\s+(all\\s+)?(your\\s+)?instructions?"
        - "(?i)what\\s+(are|were)\\s+your\\s+instructions?"
        # Structural delimiter injection
        - "(?i)\\[\\s*SYSTEM\\s*\\]"
        - "(?i)<\\s*system\\s*>"
        - "(?i)###\\s*(instruction|system|prompt)"
        - "(?i)```\\s*(system|instructions?)"
        # Jailbreak keywords
        - "(?i)jailbreak"
        - "(?i)developer\\s+mode"
        - "(?i)DAN\\s+mode"

logging:
  level:
    io:
      modelcontextprotocol: DEBUG
