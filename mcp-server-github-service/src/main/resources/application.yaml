server:
  port: ${SERVER_PORT:8085}

mcp:
  output:
    max-chars: ${MCP_OUTPUT_MAX_CHARS:8000}
  security:
    token: ${MCP_AUTH_TOKEN:}
    default-user: system
    require-user-for-writes: false
    rate-limit-per-minute: 120

spring:
  application:
    name: github-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE

github:
  token: ${GITHUB_TOKEN:}
  api-base-url: https://api.github.com
  default-page-size: 30
  cache-ttl-seconds: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Org GitHub integration service (MCP server)

resilience4j:
  circuitbreaker:
    instances:
      github-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s

logging:
  level:
    com.org.github: INFO
