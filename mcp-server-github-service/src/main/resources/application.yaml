server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: github-service
  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE

github:
  token: ${GITHUB_TOKEN:}
  api-base-url: https://api.github.com
  default-page-size: 30

mcp:
  security:
    token: ${MCP_AUTH_TOKEN:}
    default-user: system
    require-user-for-writes: false
    rate-limit-per-minute: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Org GitHub integration service (MCP server)

logging:
  level:
    com.org.github: INFO
