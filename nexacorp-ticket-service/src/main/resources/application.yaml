server:
  port: 8081

spring:
  application:
    name: nexacorp-ticket-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ticket_db
    username: postgres
    password: postgres

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    mcp:
      server:
        enabled: true
        protocol: STATELESS