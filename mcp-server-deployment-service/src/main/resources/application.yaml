server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: deployment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_ai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: 10000
  jpa:
    properties:
      jakarta:
        persistence:
          query:
            timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_deployment
    baseline-on-migrate: true
    baseline-version: 0
  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE

mcp:
  security:
    token: ${MCP_AUTH_TOKEN:}
    default-user: system
    require-user-for-writes: false
    rate-limit-per-minute: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Org deployment scheduling service (MCP server)

logging:
  level:
    com.org.deployment: INFO
