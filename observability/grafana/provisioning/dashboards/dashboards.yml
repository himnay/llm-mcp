apiVersion: 1

# Auto-loads any dashboard JSON placed next to this file so it appears in
# Grafana automatically (no manual import).
providers:
  - name: 'Org MCP'
    orgId: 1
    folder: 'Org MCP'
    folderUid: mcp-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
