# Test profile — in-memory H2 so tests run without local PostgreSQL.
spring:
  datasource:
    url: jdbc:h2:mem:hr_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

management:
  tracing:
    sampling:
      probability: 0.0
