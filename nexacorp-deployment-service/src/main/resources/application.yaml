server:
  port: 8082

spring:
  application:
    name: nexacorp-deployment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/deployment_db
    username: postgres
    password: postgres

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE