services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: postgres
    environment:
      POSTGRES_DB: spring_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d spring_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: [ "start-dev", "--import-realm" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"   # http://localhost:8180  (admin console: admin/admin)
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yml" ]
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo HTTP API / Grafana query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP  ← services send traces here
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"   # http://localhost:3000  (admin / admin)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
  redis:
    # redis-stack: includes RediSearch, required by the client's Redis vector store (FT.* commands)
    image: redis/redis-stack-server:latest
    container_name: redis
    environment:
      # persistence + eviction (formerly in llm-mcp-client/docker-compose.yml)
      REDIS_ARGS: "--appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru"
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
  mcp-inspector:
    image: node:22-alpine
    container_name: mcp-inspector
    command: npx -y @modelcontextprotocol/inspector
    environment:
      # Bind to all interfaces so the host browser can reach it
      HOST: 0.0.0.0
      CLIENT_PORT: "6274"
      SERVER_PORT: "6277"
      # Don't try to launch a browser inside the container
      MCP_AUTO_OPEN_ENABLED: "false"
      # Local dev convenience: skip the proxy auth token.
      DANGEROUSLY_OMIT_AUTH: "true"
    ports:
      - "6274:6274"   # Inspector web UI  -> http://localhost:6274
      - "6277:6277"   # MCP proxy server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  tempo-data:
  grafana-data:
