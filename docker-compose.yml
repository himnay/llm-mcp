  github-service:
    build:
      context: ./mcp-server-github-service
    container_name: github-service
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      - "8085:8085"
    restart: unless-stopped
  gmail-service:
    build:
      context: ./mcp-server-gmail-service
    container_name: gmail-service
    environment:
      GMAIL_ACCESS_TOKEN: ${GMAIL_ACCESS_TOKEN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      - "8086:8086"
    restart: unless-stopped
  travel-service:
    build:
      context: ./mcp-server-travel-service
    container_name: travel-service
    environment:
      SERVER_PORT: 8087
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET}
      AMADEUS_BASE_URL: ${AMADEUS_BASE_URL:-https://test.api.amadeus.com}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      - "8087:8087"
    restart: unless-stopped
  mcp-inspector:
    image: node:22-alpine
    container_name: mcp-inspector
    command: npx -y @modelcontextprotocol/inspector
    environment:
      # Bind to all interfaces so the host browser can reach it
      HOST: 0.0.0.0
      CLIENT_PORT: "6274"
      SERVER_PORT: "6277"
      # Don't try to launch a browser inside the container
      MCP_AUTO_OPEN_ENABLED: "false"
      # Local dev convenience: skip the proxy auth token.
      DANGEROUSLY_OMIT_AUTH: "true"
    ports:
      - "6274:6274"   # Inspector web UI  -> http://localhost:6274
      - "6277:6277"   # MCP proxy server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  tempo-data:
  grafana-data:
