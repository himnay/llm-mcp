server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ticket-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spring_ai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_ticket
    baseline-on-migrate: true
    baseline-version: 0
  ai:
    mcp:
      server:
        enabled: true
        protocol: STATELESS

mcp:
  security:
    token: ${MCP_AUTH_TOKEN:}
    default-user: system
    require-user-for-writes: false
    rate-limit-per-minute: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

info:
  app:
    name: ${spring.application.name}
    description: Org ticket service (MCP server)

logging:
  level:
    com.org.ticket: INFO
